services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurantos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: restaurantos
      POSTGRES_PASSWORD: restaurantos
      POSTGRES_DB: restaurantos
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurantos -d restaurantos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
